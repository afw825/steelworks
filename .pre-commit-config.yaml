repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: poetry run ruff format
        language: system
        types_or: [python, pyi]

      - id: ruff-check
        name: ruff check
        entry: poetry run ruff check
        language: system
        types_or: [python, pyi]

      - id: mypy
        name: mypy
        entry: poetry run mypy src
        language: system
        pass_filenames: false

      - id: unit-tests
        name: unit tests
        entry: poetry run pytest tests/unit -q
        language: system
        pass_filenames: false
        always_run: true

      - id: license-check-gpl
        name: license check (block GPL family)
        entry: poetry run pip-licenses --from=mixed --fail-on "GPL;LGPL;AGPL" --partial-match
        language: system
        pass_filenames: false
        always_run: true
